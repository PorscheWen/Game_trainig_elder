<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5B6EE8"/>
      <stop offset="100%" style="stop-color:#7B8EF0"/>
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#F0F2FF;stop-opacity:0.95"/>
    </linearGradient>
  </defs>

  <!-- 背景圓角矩形 -->
  <rect width="512" height="512" rx="100" ry="100" fill="url(#bg)"/>

  <!-- 裝飾圓點 -->
  <circle cx="80" cy="80" r="30" fill="rgba(255,255,255,0.15)"/>
  <circle cx="432" cy="432" r="50" fill="rgba(255,255,255,0.1)"/>
  <circle cx="440" cy="80" r="20" fill="rgba(255,255,255,0.12)"/>

  <!-- 左上卡片（翻開） -->
  <rect x="60" y="140" width="160" height="200" rx="22" ry="22" fill="url(#card1)" filter="drop-shadow(0 6px 16px rgba(0,0,0,0.2))"/>
  <text x="140" y="260" text-anchor="middle" font-size="90">🍎</text>

  <!-- 右下卡片（翻開，配對） -->
  <rect x="292" y="172" width="160" height="200" rx="22" ry="22" fill="url(#card1)" filter="drop-shadow(0 6px 16px rgba(0,0,0,0.2))"/>
  <text x="372" y="292" text-anchor="middle" font-size="90">🍎</text>

  <!-- 右上卡片（未翻開） -->
  <rect x="292" y="100" width="130" height="140" rx="18" ry="18" fill="rgba(255,255,255,0.25)" stroke="rgba(255,255,255,0.4)" stroke-width="3"/>
  <text x="357" y="186" text-anchor="middle" font-size="60" fill="rgba(255,255,255,0.8)">?</text>

  <!-- 左下卡片（未翻開） -->
  <rect x="60" y="360" width="130" height="140" rx="18" ry="18" fill="rgba(255,255,255,0.25)" stroke="rgba(255,255,255,0.4)" stroke-width="3"/>
  <text x="125" y="446" text-anchor="middle" font-size="60" fill="rgba(255,255,255,0.8)">?</text>

  <!-- 配對成功打勾 -->
  <circle cx="200" cy="430" r="32" fill="#27AE60"/>
  <text x="200" y="445" text-anchor="middle" font-size="36" fill="white">✓</text>
  <circle cx="432" cy="290" r="32" fill="#27AE60"/>
  <text x="432" y="305" text-anchor="middle" font-size="36" fill="white">✓</text>
</svg>
