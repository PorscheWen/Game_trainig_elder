# 團體榜：由 GitHub API repository_dispatch 觸發，合併一筆成績後提交 leaderboard.json
# 遊戲端（team-scores-client.js）以 PAT 呼叫 POST /repos/.../dispatches（勿將 token 提交公開庫）

name: Leaderboard update

on:
  repository_dispatch:
    types: [leaderboard_submit]

concurrency:
  group: leaderboard-json
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Merge score into leaderboard.json
        env:
          CLIENT_PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: node scripts/merge-leaderboard-submit.cjs

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add leaderboard.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: update leaderboard [skip ci]"
          git push
