services:
  # 團體榜 API（Express server.js）；部署後網址通常為 https://grannys-got-game-api.onrender.com
  - type: web
    name: grannys-got-game-api
    runtime: node
    plan: free
    buildCommand: npm install --omit=dev
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: GAME_URL
        value: https://porschewen.github.io/GrannysGotGame/
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: GITHUB_REPO_OWNER
        sync: false
      - key: GITHUB_REPO_NAME
        sync: false
      - key: GITHUB_DISPATCH_TOKEN
        sync: false

  - type: cron
    name: grannys-got-game-push
    runtime: node
    schedule: "0 1 * * *"   # 台灣時間 09:00 (UTC+8)
    buildCommand: npm install --omit=dev
    startCommand: node push/daily_push.js
    envVars:
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: LINE_USER_ID
        sync: false
      - key: GAME_URL
        value: https://porschewen.github.io/GrannysGotGame/
